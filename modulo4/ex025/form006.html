<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <!-- TODO FORMULÁRIO QUE PASSA DE 3 MIL BYTES, O MÉTODO GET NÃO ENVIA! -->
    <h1>Exemplo de Formulário</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
        <p>
            <!-- Os controles de cores são representados de formas diferentes dependendo do navegador, podendo, até memso, colocar caixas de texto no lugar. Por isso, sempre teste seus sites em outros navegadores, principalmente componetes de formulários. -->
            <label for="icor">Cor: </label>
            <input type="color" name="cor" id="icor" value="#00ff00">
        </p>
        <p>
            <label for="inivel">Nível de Satisfação: </label>
            <input type="range" name="nivel" id="inivel" min="1" max="5" value="1">
        </p>
        <p>
            <!-- Quando você for usar esse atributo de envio de arquivos, e elementos que passam de 3 mil bytes, você DEVE usar o "method:'post'". -->
            <label for="ifoto">Foto do perfil: </label>
            <input type="file" name="foto" id="ifoto">
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
