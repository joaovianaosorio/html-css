<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <!-- TODO FORMULÁRIO QUE PASSA DE 3 MIL BYTES, O MÉTODO GET NÃO ENVIA! -->
    <h1>Exemplo de Formulário</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
        <fieldset> 
            <!-- 
            fieldset -> grupo de campo 
            Ele é bom para você agrupar dados que semelhantes. ex: escolaridades, pessoais, família, etc.
            -->
            <legend>Dados Pessoais</legend>
            <p>
                <label for="inome">Nome</label>
                <input type="text" name="nome" id="inome" minlength="5" maxlength="20" required>
            </p>
            <p>
                <label for="iemail">E-mail</label>
                <input type="email" name="email" id="iemail" autocomplete="email" required>
            </p>
            <p>
                <label for="itel">Telefone</label>
                <input type="tel" name="tel" id="itel" autocomplete="tel" pattern="^\(\d{2}\)\d{4,5}-\d{4}$" required placeholder="(xx)xxxxx-xxxx">
            </p>
        </fieldset>
        <!-- 
        Estudar mais sobre RegEx -> Regular Expressions.
        Mas nenhum padrão de RegEx será suficiente para bloquear tipo de dados errados. Essa validação deve ser feita em JavaScript ou PHP.

        As RegEx ficam dentro do atributo "pattern", e as RegEx sempre começam com "^" e terminam com "$".

        A expressão regular acima siginifica:
        \(\d{2}\) -> será necessário colocar parênteses "( )" e 2 números entre os parênteses (DDD).
        \d{4,5} -> será necessário colocar entre 4 e 5 algoritmos de 0-9 na primeira parte do número.
        \d{4} -> será necessário colocar 4 algoritmos de 0-9 na segunda parte do número.
        -->
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
