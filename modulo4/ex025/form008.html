<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Exemplo de Formulário</h1>
    <form action="cadastro.php" method="get">
        <p>
            <label for="1n1">Número 1: </label>
            <input type="number" name="n1" id="in1" min="0" max="50" required oninput="isoma.innerHTML = Number(in1.value) + Number(in2.value)">
            <!-- 
            oninput -> quando eu entrar com dados, fazer...
            isoma.innerHTML -> o HTML que estiver dentro de "isoma" vai receber...
            -->
        </p>
        <p>
            <label for="1n2">Número 2: </label>
            <input type="number" name="n2" id="in2" min="0" max="50" required oninput="isoma.innerHTML = Number(in1.value) + Number(in2.value)">
        </p>
        <p>
            <label for="isoma">Soma: </label>
            <output id="isoma" name="soma">0</output>
            <!-- 
            O visitante não consegue alterar diretamente o output. 
            Quando você aperta em "Enviar", a soma não é mandada. O output somente calcula e mostra na tela.
            -->
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
