<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe</title>
    <style>
        iframe.rep{
            width: 400px;
            height: 400px; 
            border: 1x dashed black;
        }
    </style>
</head>
<body>
    <!-- 
        O iframe é inline, ou seja, na mesma linha. 

        Tamanho padrão do iframe 300x150. Porém nós podemos mudar o tamanho na tag iframe, sendo que as configurações feitas no CSS sempre vão prevalecer.

        A característica "scolling" tem 3 opções. O "auto" deixa a barra de rolagem visível se for necessária; o "yes" apresenta a barra de rolagem se necessária ou não; e o "no" não apresentará a barra de rolagem. Mas também vai depender do navegador e do sistema operacional da máquina.

        A característica "frameborder" da uma borda para o seu iframe. Ela pode ser retirar e você também pode colocar borda pelo CSS.
    --> 
    <h1>Testando o uso de um iframe</h1>
    <p>Acessando o site do <a href="https://www.cursoemvideo.com" target="_blank">Curso em Vídeo</a> para aprender a programar.</p>
    <br>

    <p>
        Acessando o site do 

        <iframe src="https://www.cursoemvideo.com" frameborder="0" height="500" width="500" scolling="auto">

        </iframe>

        par aprender a programar. 
    </p>
    <br>
    <p>O site do <iframe src="https://www.google.com" frameborder="0"> !!! </iframe>também é muito legal</p>
    <!-- Alguns sites tem um conteúdo protegido para não serem visualizados em iframe. 
    Eles também tem alguns problemas de segurança que com HTML nós podemos contornar. Eles não são bons em tudo mas tem algumas coisas nos quais eles são bons. -->

    <p>
        O repositório do Guanabara também é bem legal

        <iframe src="https://gustavoguanabara.github.io" frameborder="0" class="rep">
            <a href="https://gustavoguanabara.github.io" target="_blank">Repositório</a>
        </iframe>

        também é bem legal!
        <!--
            Nem todos os dispositivos móveis conseguem acessar o iframe. Sendo assim, se o site não carregar, o que for colocado dentro da tag do iframe, é o que aparecerá. No exemplo do Google, seria o "!!!" 
            Se não for compatível, vc também pode colocar um link para o site por meio da tag <a>
        -->
    </p>
</body>
</html>
