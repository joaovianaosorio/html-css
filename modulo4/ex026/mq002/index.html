<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Query</title>
    <link rel="stylesheet" href="estilos/style.css" media="all">
    <link rel="stylesheet" href="estilos/vertical.css" media="screen and (orientation: portrait)">
    <link rel="stylesheet" href="estilos/horizontal.css" media="screen and (orientation: landscape)">
    <!-- 
    Media Types são escritos dessa forma: "media:'screen'"
    Media Features são escritos entre parênteses, por exemplo: "media:'screen and (orientation: portrait)'"
     -->
    <link rel="stylesheet" href="estilos/horizontal.css" media="screen">
    <!--
    Nesse tipo de mídia, vc deve colocar as mesmas configurações de CSS que vc usaria p/ todos os tipos de mídia (dispositivos).
    Por exemplo, você colocaria as configurações do arquivo "style.css" e "impressora.css" da pasta "mq001" que se repetem nesse tipo de media, "all".
    -->
</head>
<body>
    <h1>Mude a orientação do seu dispositivo</h1>
    <!--
    O acelerômetro do celular identifica se ele está na horizontal ou vertical.
    Os computadores identificam se estaria na "horizontal" ou "vertcial" pela largura e altura da tela.
    No computador: 
    - tela p/ celular (+ alto) -> portrait
    - tela p/ notebook (+ largo) -> landscape
    -->
</body>
</html>
